name: schema-drift-sanitizer-eventual-consistency-resolver
category: "Data Querying and Databases"
sub_category: "NoSQL and Document Stores"

description: >
  Migrate a 10-generation, schema-drifted MongoDB order collection with
  out-of-order microservice updates into a unified schema, resolving
  conflicts per a disclosed precedence rule set.

difficulty: hard
expert_time_estimate_hours: 5.5

agent_workdir: /app

build:
  dockerfile: Dockerfile
  context: .

verifier:
  entrypoint: "python3 /verifier/verify.py"
  timeout_seconds: 1200
  pass_criteria: "exit code 0"

resources:
  cpu: 2
  memory_gb: 4
  network: none

tags:
  - mongodb
  - schema-migration
  - eventual-consistency
  - conflict-resolution
  - document-store
